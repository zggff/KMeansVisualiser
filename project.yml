name: KMeans
options:
  bundleIdPrefix: com.zggff

packages:
  Inject:
    url: https://github.com/krzysztofzablocki/Inject.git
    from: 1.6.0
  InjectionNext:
    url: https://github.com/johnno1962/InjectionNext.git
    from: 2.0.0
  Renderer3D:
    path: ./Renderer3D

targets:
  KMeans:
    type: application
    platform: [macOS, iOS]
    sources: [Sources, Resources]
    dependencies:
      - package: Inject 
      - package: InjectionNext 
      - package: Renderer3D
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        SWIFT_VERSION: 6.3
        GENERATE_INFOPLIST_FILE: YES
        "INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription[sdk=iphoneos*]": "to save generated files"
      configs:
        Debug:
          OTHER_LDFLAGS: "$(inherited) -Xlinker -interposable"
          EMIT_FRONTEND_COMMAND_LINES: "YES"
